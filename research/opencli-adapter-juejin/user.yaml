site: juejin
name: user
description: 掘金用户文章列表
domain: juejin.cn

args:
  user_id:
    type: str
    required: true
    positional: true
    description: "User ID (e.g. 2444938365386621)"
  limit:
    type: int
    default: 20
    description: Number of articles

pipeline:
  - navigate: https://juejin.cn

  - evaluate: |
      (async () => {
        const res = await fetch('https://api.juejin.cn/content_api/v1/article/query_list', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({
            cursor: '0',
            limit: ${{ args.limit }},
            sort_type: 2,
            user_id: '${{ args.user_id }}'
          })
        });
        const data = await res.json();
        return (data?.data || []).map((item) => {
          const article = item.article_info || {};
          return {
            title: article.title,
            views: article.view_count,
            likes: article.digg_count,
            comments: article.comment_count,
            article_id: article.article_id
          };
        });
      })()

  - map:
      rank: ${{ index + 1 }}
      title: ${{ item.title }}
      views: ${{ item.views }}
      likes: ${{ item.likes }}
      comments: ${{ item.comments }}
      url: https://juejin.cn/post/${{ item.article_id }}

  - limit: ${{ args.limit }}

columns: [rank, title, views, likes, comments, url]
