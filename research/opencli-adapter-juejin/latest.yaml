site: juejin
name: latest
description: 掘金最新文章
domain: juejin.cn

args:
  limit:
    type: int
    default: 20
    description: Number of articles

pipeline:
  - navigate: https://juejin.cn

  - evaluate: |
      (async () => {
        const res = await fetch('https://api.juejin.cn/recommend_api/v1/article/recommend_all_feed', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ id_type: 2, sort_type: 300, cursor: '0', limit: ${{ args.limit }} })
        });
        const data = await res.json();
        return (data?.data || []).map((item) => {
          const info = item.item_info || {};
          const article = info.article_info || {};
          const author = info.author_user_info || {};
          return {
            title: article.title,
            author: author.user_name,
            views: article.view_count,
            likes: article.digg_count,
            comments: article.comment_count,
            article_id: article.article_id
          };
        });
      })()

  - map:
      rank: ${{ index + 1 }}
      title: ${{ item.title }}
      author: ${{ item.author }}
      views: ${{ item.views }}
      likes: ${{ item.likes }}
      comments: ${{ item.comments }}
      url: https://juejin.cn/post/${{ item.article_id }}

  - limit: ${{ args.limit }}

columns: [rank, title, author, views, likes, comments, url]
